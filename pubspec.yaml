name: women_safety
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI and Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.3

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0
  google_sign_in: ^7.1.1

  # Local Database and Storage
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.3

  # Networking
  http: ^1.2.1

  # Bluetooth
  flutter_blue_plus: ^1.35.5

  # Permissions
  permission_handler: ^12.0.1

  # Location
  geolocator: ^14.0.2

  # Emergency Communication
  url_launcher: ^6.3.0
  flutter_phone_direct_caller: ^2.1.1

  # Notifications
  flutter_local_notifications: ^19.4.0

  # ONNX AI Inference
  onnxruntime: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/shieldher_model.onnx
    - assets/models/feature_order.json